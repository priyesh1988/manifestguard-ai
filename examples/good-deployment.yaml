apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-good
  namespace: demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-good
  template:
    metadata:
      labels:
        app: api-good
    spec:
      automountServiceAccountToken: false
      containers:
        - name: app
          image: ghcr.io/acme/api:1.2.3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            privileged: false
